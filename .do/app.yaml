name: stampworth
region: sgp
services:
  - name: api
    github:
      repo: TyroneSAYON/Stampworth
      branch: main
      deploy_on_push: true
    dockerfile_path: /Dockerfile
    source_dir: /
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 5
    routes:
      - path: /api
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: SUPABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_WITH_SUPABASE_URL
      - key: SUPABASE_ANON_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_WITH_SUPABASE_ANON_KEY
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_WITH_SUPABASE_SERVICE_ROLE_KEY

  - name: admin
    github:
      repo: TyroneSAYON/Stampworth
      branch: main
      deploy_on_push: true
    build_command: npm run build
    run_command: npm run start
    source_dir: /admin
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: REPLACE_WITH_SUPABASE_URL
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        scope: RUN_AND_BUILD_TIME
        value: REPLACE_WITH_SUPABASE_ANON_KEY
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_WITH_SUPABASE_SERVICE_ROLE_KEY
