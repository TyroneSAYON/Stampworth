name: stampworth-backend
region: sgp
services:
  - name: api
    github:
      repo: https://github.com/TyroneSAYON/Stampworth.git
      branch: main
      deploy_on_push: true
    dockerfile_path: /Dockerfile
    source_dir: /
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    health_check:
      http_path: /api/health
      initial_delay_seconds: 15
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: SUPABASE_URL
        scope: RUN_TIME
        type: SECRET
